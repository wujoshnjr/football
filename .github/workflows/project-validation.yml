name: Project Validation

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  backend-validation:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: .
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install backend dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r backend/requirements.txt

      - name: Run backend tests
        run: pytest tests

      - name: Generate source report
        run: python scripts/ingest_open_sources.py

      - name: Sync fixture cache
        run: python scripts/sync_fixture_cache.py

      - name: Build feature table
        run: python scripts/build_feature_table.py

      - name: Upload validation artifacts
        uses: actions/upload-artifact@v4
        with:
          name: football-validation-artifacts
          path: |
            report/data_sources_report.json
            report/fixture_cache_report.json
            report/feature_table_report.json
            data/raw/source_registry_snapshot.json
            data/cache/fixtures_latest.json
            data/features/match_features.json

  frontend-build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        run: npm install

      - name: Build frontend
        env:
          NEXT_PUBLIC_API_BASE_URL: http://localhost:8000
        run: npm run build
